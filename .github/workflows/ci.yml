name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nix-build:
    name: Build with Nix (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # NixOS VM tests carry requiredSystemFeatures = [ "kvm" "nixos-test" ].
      # GitHub's ubuntu-24.04-arm runners expose no usable /dev/kvm, so the Nix
      # daemon there never advertises the "kvm" feature and a plain
      # `nix flake check` aborts before building anything. Evaluate every flake
      # output, then build only the checks whose required system features this
      # runner actually provides.
      - name: Check Nix flake
        env:
          SYSTEM: ${{ matrix.system }}
        run: |
          set -euo pipefail

          nix flake check --no-build --show-trace --system "$SYSTEM"

          available=" $(nix config show system-features) "
          echo "Runner system features:$available"

          mapfile -t names < <(
            nix eval --json --system "$SYSTEM" ".#checks.$SYSTEM" --apply builtins.attrNames | jq -r '.[]'
          )

          build=()
          skipped=()
          for name in "${names[@]}"; do
            attr=".#checks.$SYSTEM.$name"
            drv=$(nix path-info --derivation --system "$SYSTEM" "$attr")
            required=$(nix derivation show "$drv" |
              jq -r '[.. | objects | .requiredSystemFeatures? // empty] | first // ""')

            missing=""
            for feature in $required; do
              case "$available" in
              *" $feature "*) ;;
              *) missing="$missing $feature" ;;
              esac
            done

            if [ -n "$missing" ]; then
              skipped+=("$name (needs:$missing)")
            else
              build+=("$attr")
            fi
          done

          if [ ${#skipped[@]} -gt 0 ]; then
            printf '::warning::Skipping check %s: unsupported on this runner\n' "${skipped[@]}"
          fi

          nix build --no-link --print-build-logs "${build[@]}"

      - name: Build gp-gui
        run: nix build .#packages.${{ matrix.system }}.gp-gui --print-build-logs --out-link result-gp-gui

      - name: Check runtime dependencies
        run: |
          nix build .#checks.${{ matrix.system }}.gp-gui-deps --print-build-logs

      - name: Copy binary for upload
        run: |
          mkdir -p artifacts
          cp -L result-gp-gui/bin/gp-gui artifacts/gp-gui
          chmod +x artifacts/gp-gui

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gp-gui-${{ matrix.system }}-${{ github.sha }}
          path: artifacts/gp-gui
          retention-days: 7

  nix-checks:
    name: Nix Checks
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run pre-commit hooks
        run: nix build .#checks.x86_64-linux.pre-commit --print-build-logs

  cargo-test:
    name: Cargo Tests
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Nix
        uses: cachix/install-nix-action@ba0dd844c9180cbf77aa72a116d6fbc515d0e87b # v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Run Rust tests
        run: nix develop --impure -c cargo test --all
